<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sơ đồ Kế hoạch Công nghệ TCT TDT 2026</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 1180px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 24px; font-weight: 750; fill: var(--fg); }
  .subtitle { font-size: 13px; fill: var(--muted); }
  .label { font-size: 14px; font-weight: 650; fill: var(--fg); }
  .small { font-size: 12px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.2; rx: 16; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.7; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: .75; }
</style>

    <path class="edge" marker-end="url(#arrow)" d="M330 165 C390 165 405 260 465 260" />
    <path class="edge" marker-end="url(#arrow)" d="M330 255 C390 255 405 300 465 300" />

    <path class="edge" marker-end="url(#arrow)" d="M690 375 C735 375 755 520 800 520" />

    <path class="edge" marker-end="url(#arrow)" d="M930 300 C980 300 1000 640 1040 640" />

    <path class="edge" marker-end="url(#arrow)" d="M930 520 C980 520 1000 670 1040 670" />
    <path class="edge" marker-end="url(#arrow)" d="M930 190 C980 190 1000 625 1040 625" />

    <!-- Zones -->

    <rect x="530" y="760" width="16" height="16" class="node external" />
    <text x="554" y="773" class="small">Mốc bàn giao</text>
  </svg>
</main>
