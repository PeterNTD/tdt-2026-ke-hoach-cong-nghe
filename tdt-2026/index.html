<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kế Hoạch Công Nghệ 2026</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var force = (params.get('view') || '').toLowerCase();
      var target;

      if (force === 'pc' || force === 'desktop' || force === 'web') {
        target = 'desktop.html';
      } else if (force === 'mobile' || force === 'm') {
        target = 'mobile.html';
      } else {
        var ua = navigator.userAgent || navigator.vendor || window.opera || '';
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var narrow = window.matchMedia && window.matchMedia('(max-width: 820px)').matches;
        var mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        target = (mobileUA || (coarse && narrow)) ? 'mobile.html' : 'desktop.html';
      }

      var hash = window.location.hash || '';
      var next = target + hash;
      window.location.replace(next);
    })();
  </script>
  <style>
    :root{--bg:#f4f7fb;--ink:#132238;--muted:#667085;--primary:#0b63ce;--line:#e5eaf2}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:Inter,"Segoe UI",Arial,sans-serif;color:var(--ink)}
    .card{width:min(560px,calc(100vw - 32px));background:white;border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 18px 46px rgba(15,23,42,.08);text-align:center}
    h1{margin:0 0 8px;font-size:28px;color:#082b5f}p{margin:0 0 20px;color:var(--muted)}.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 16px;background:var(--primary);color:white;text-decoration:none;font-weight:850}.secondary{background:#eef6ff;color:var(--primary)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Đang mở Kế Hoạch Công Nghệ 2026</h1>
    <p>Trang sẽ tự nhận diện thiết bị để chuyển sang bản PC hoặc mobile.</p>
    <div class="actions">
      <a href="desktop.html">Mở bản PC</a>
      <a class="secondary" href="mobile.html">Mở bản mobile</a>
    </div>
  </main>
</body>
</html>
